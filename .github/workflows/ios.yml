name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install CocoaPods（🔥關鍵）
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      # 3️⃣ Build
      - name: Build
        run: |
          xcodebuild \
          -workspace RideTogether.xcworkspace \
          -scheme RideTogether \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

      # 4️⃣ Test
      - name: Test
        run: |
          xcodebuild \
          -workspace RideTogether.xcworkspace \
          -scheme RideTogether \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          test
